spring.application.name=noteaiFront
server.port=8081

# ============================================================
# 数据库配置
# 部署时通过环境变量覆盖：DB_URL / DB_USERNAME / DB_PASSWORD
# 本地开发使用默认值（无需额外配置）
# ============================================================
# MySQL 连接地址 - 支持通过环境变量 DB_URL 覆盖
spring.datasource.url=jdbc:mysql://${DB_URL:localhost:3306/aiclassnotetable}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# 数据库用户名 - 支持通过环境变量 DB_USERNAME 覆盖
spring.datasource.username=${DB_USERNAME:root}
# 数据库密码 - 支持通过环境变量 DB_PASSWORD 覆盖
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# DeepSeek AI API 配置
# 部署时通过环境变量覆盖：DEEPSEEK_API_KEY
# ============================================================
# API 密钥 - 支持通过环境变量 DEEPSEEK_API_KEY 覆盖
deepseek.api.key=${DEEPSEEK_API_KEY:sk-1fed55acc2784db287c7a67bda4fbddc}
deepseek.api.url=https://api.deepseek.com/chat/completions

# ============================================================
# 文件上传路径配置（Docker 部署时可能需要挂载卷）
# ============================================================
# 文件上传根目录（支持通过环境变量 FILE_UPLOAD_DIR 覆盖）
# 默认使用项目根目录下的 file 文件夹
# Docker 部署时通过 volumes 挂载到 /app/file
file.upload-dir=${FILE_UPLOAD_DIR:./file}
